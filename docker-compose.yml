services:
  backend:
    # 指向後端資料夾，使用我們剛剛改好的 Dockerfile
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      # API Key 不要寫死，要在雲端平台的變數設定中填寫
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DATABASE_URL=sqlite:////data/games.db
      - STOCKFISH_PATH=/usr/games/stockfish
      - STOCKFISH_REVIEW_NODES=${STOCKFISH_REVIEW_NODES:-4000}
    volumes:
      - backend_data:/data

  frontend:
    # 指向前端資料夾，使用我們剛剛新增的 Dockerfile
    build:
      context: ./frontend
    ports:
      - "80:80" # 前端通常對外開放 80 port
    depends_on:
      - backend

volumes:
  backend_data:
